<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Premier Annual Plan Merged Prototype</title>
    <style>
      :root {
        --paper: #fffdf8;
        --ink: #211b16;
        --muted: #5a5046;
        --line: #d8c79f;
        --line-soft: #eadfca;
        --gold: #b78a31;
        --left-w: 188px;
        --col-w: 88px;
        --header-h: 92px;
        --school-h: 236px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(135deg, rgb(255 255 255 / 72%), rgb(255 255 255 / 0%) 42%),
          #f4efe6;
        color: var(--ink);
        font-family: "Yu Gothic", "YuGothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      }

      button {
        font: inherit;
      }

      .prototype-page {
        width: min(1220px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }

      .annual-card {
        border: 1px solid #e0d2b8;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgb(255 255 255 / 98%), rgb(255 253 249 / 98%)),
          var(--paper);
        padding: 22px;
        box-shadow:
          0 18px 44px rgb(43 32 18 / 10%),
          inset 0 1px 0 rgb(255 255 255 / 80%);
      }

      .annual-card__head {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        margin-bottom: 16px;
        border-bottom: 1px solid #e8dec8;
        padding-bottom: 16px;
      }

      .annual-card__eyebrow {
        margin: 0 0 6px;
        color: #8b6b32;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        line-height: 1;
      }

      .annual-card h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.45rem, 2.6vw, 2.08rem);
        line-height: 1.3;
      }

      .annual-card__lead {
        max-width: 760px;
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 800;
        line-height: 1.7;
      }

      .annual-card__preview {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(132px, 156px);
        gap: 12px;
        align-items: stretch;
      }

      .annual-card__actions {
        display: grid;
      }

      .lux-button {
        position: relative;
        isolation: isolate;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 8px;
        min-height: 100%;
        border: 1px solid rgb(255 255 255 / 38%);
        border-radius: 8px;
        background:
          radial-gradient(circle at 50% 0, rgb(255 255 255 / 30%), transparent 52%),
          linear-gradient(180deg, #5a3f22 0%, #2c1e12 52%, #15100c 100%);
        color: #fffaf0;
        padding: 18px 14px;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 26%),
          0 18px 34px rgb(43 32 18 / 18%);
        cursor: pointer;
        font-size: 0.96rem;
        font-weight: 900;
        line-height: 1.2;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        transition:
          box-shadow 180ms ease,
          transform 180ms ease,
          filter 180ms ease;
      }

      .lux-button::before {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgb(255 255 255 / 34%);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 16%, rgb(255 255 255 / 58%), rgb(255 255 255 / 0%) 44%),
          linear-gradient(180deg, #fff8e2, #d2ad55);
        color: #2f2112;
        content: "+";
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.45rem;
        line-height: 1;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 64%),
          0 10px 18px rgb(20 14 10 / 24%);
      }

      .lux-button span,
      .lux-button small {
        position: relative;
        z-index: 1;
        display: block;
      }

      .lux-button small {
        color: rgb(255 250 240 / 76%);
        font-size: 0.68rem;
        font-weight: 900;
        letter-spacing: 0.04em;
      }

      .lux-button:hover {
        background:
          radial-gradient(circle at 50% 0, rgb(255 255 255 / 34%), transparent 52%),
          linear-gradient(180deg, #6a4928 0%, #332214 52%, #17110d 100%);
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 30%),
          0 22px 40px rgb(43 32 18 / 22%);
        filter: saturate(1.04);
        transform: translateY(-1px);
      }

      .fit-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 10px;
        box-shadow: 0 16px 34px rgb(43 32 18 / 8%);
      }

      .fit-stage {
        position: relative;
        overflow: hidden;
        min-height: 280px;
        border-radius: 6px;
        background:
          linear-gradient(180deg, #fff, #fffaf1),
          #fff;
      }

      .fit-stage .plan-table-shell {
        transform-origin: top left;
      }

      .plan-table-shell {
        width: max-content;
      }

      .plan-table-scroll {
        overflow: auto;
        max-width: 100%;
        max-height: min(78vh, 720px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        scrollbar-color: #b78a31 #f3ead9;
        scrollbar-width: thin;
      }

      table.plan-table {
        width: max-content;
        border-collapse: separate;
        border-spacing: 0;
        table-layout: fixed;
      }

      .plan-table col:first-child {
        width: var(--left-w);
      }

      .plan-table col:not(:first-child) {
        width: var(--col-w);
      }

      .plan-table th,
      .plan-table td {
        border-right: 1px solid #d6cbbb;
        border-bottom: 1px solid #ded4c2;
        vertical-align: top;
      }

      .plan-table thead th {
        position: sticky;
        top: 0;
        z-index: 20;
        height: var(--header-h);
        background:
          linear-gradient(180deg, rgb(255 255 255 / 10%), rgb(255 255 255 / 0%)),
          linear-gradient(180deg, #57483f, #352b27);
        color: #fffaf0;
        text-align: center;
      }

      .plan-table thead th:first-child,
      .plan-table tbody th {
        position: sticky;
        left: 0;
      }

      .plan-table thead th:first-child {
        z-index: 35;
        background: linear-gradient(180deg, #4b3d37, #302621);
        padding: 16px 12px;
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .level-head {
        position: relative;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 5px;
        height: 100%;
        padding: 9px 6px 10px;
      }

      .level-head::after {
        position: absolute;
        right: 9px;
        bottom: -1px;
        left: 9px;
        height: 3px;
        border-radius: 999px 999px 0 0;
        background: linear-gradient(90deg, #8a6721, #d7b766, #8a6721);
        content: "";
      }

      .level-head strong {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid rgb(255 255 255 / 28%);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 18%, rgb(255 255 255 / 24%), rgb(255 255 255 / 0%) 44%),
          linear-gradient(180deg, #fff9e8, #d9bc72);
        color: #2f2821;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.46rem;
        line-height: 1;
      }

      .level-head small {
        display: grid;
        gap: 1px;
        color: #fffaf0;
        font-size: 0.62rem;
        font-weight: 900;
        line-height: 1.25;
      }

      .level-head small span {
        white-space: nowrap;
      }

      .plan-table tbody th {
        z-index: 14;
        min-width: var(--left-w);
        border-right: 1px solid #c7bca7;
        background:
          linear-gradient(120deg, rgb(255 255 255 / 94%), rgb(249 244 235 / 98%)),
          #fffdf8;
        text-align: left;
      }

      .schools-row th {
        top: var(--header-h);
        z-index: 18;
        height: var(--school-h);
        background: linear-gradient(180deg, #f7f1e5, #ede4d4);
        color: #2f2821;
        padding: 16px 14px;
        text-align: center;
      }

      .schools-row th span {
        position: sticky;
        top: calc(var(--header-h) + 16px);
        display: block;
        font-weight: 900;
        line-height: 1.5;
      }

      .school-cell {
        height: var(--school-h);
        background:
          linear-gradient(180deg, rgb(255 255 255 / 88%), rgb(249 247 243 / 96%)),
          #f3f1ed;
        padding: 11px 8px;
      }

      .school-cell ul {
        display: grid;
        gap: 3px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .school-cell li,
      .school-cell p {
        margin: 0;
        color: #443c34;
        font-size: 0.66rem;
        font-weight: 800;
        line-height: 1.38;
      }

      .school-cell li {
        position: relative;
        padding-left: 8px;
      }

      .school-cell li::before {
        position: absolute;
        top: 0.62em;
        left: 0;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--gold);
        content: "";
      }

      .track-row {
        --track: #a60813;
        --track-deep: #65090d;
        --track-soft: #fff4f1;
      }

      .track-row--gold {
        --track: #b87805;
        --track-deep: #704804;
        --track-soft: #fff8e9;
      }

      .track-row--green {
        --track: #668d13;
        --track-deep: #334b09;
        --track-soft: #f6faeb;
      }

      .track-head {
        height: 114px;
        padding: 10px 10px 9px;
        background:
          linear-gradient(120deg, rgb(255 255 255 / 92%), rgb(249 244 235 / 97%)),
          var(--track-soft) !important;
      }

      .track-mark {
        display: flex;
        align-items: baseline;
        color: var(--track);
        font-family: Georgia, "Times New Roman", serif;
        line-height: 0.86;
      }

      .track-mark span {
        font-size: 2.62rem;
      }

      .track-mark em {
        margin-left: -0.08em;
        font-size: 1.04rem;
        font-style: normal;
      }

      .track-head p,
      .track-head strong,
      .track-head small,
      .track-head b {
        display: block;
        margin: 0;
      }

      .track-head p {
        color: var(--track);
        font-size: 0.66rem;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .track-head strong {
        margin-top: 4px;
        color: #14110f;
        font-size: 0.78rem;
        font-weight: 900;
        line-height: 1.32;
      }

      .track-head small {
        margin-top: 2px;
        color: #352d25;
        font-size: 0.62rem;
        font-weight: 900;
        line-height: 1.3;
      }

      .track-head b {
        width: fit-content;
        margin-top: 6px;
        background: linear-gradient(180deg, var(--track), var(--track-deep));
        color: #fffaf0;
        padding: 5px 8px;
        font-size: 0.62rem;
        line-height: 1;
      }

      .lane-cell {
        position: relative;
        height: 114px;
        padding: 0;
        background:
          linear-gradient(180deg, rgb(255 255 255 / 72%), rgb(255 255 255 / 24%)),
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent calc(var(--col-w) - 1px),
            rgb(72 62 52 / 22%) calc(var(--col-w) - 1px),
            rgb(72 62 52 / 22%) var(--col-w)
          ),
          linear-gradient(90deg, var(--track-soft), #fffdf8);
      }

      .promotion-line {
        position: absolute;
        top: 12px;
        bottom: 16px;
        left: var(--left);
        z-index: 1;
        border-left: 2px dashed rgb(54 51 48 / 50%);
      }

      .course-bar {
        position: absolute;
        top: var(--top);
        left: var(--left);
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: var(--width);
        min-height: 22px;
        border: 1px solid rgb(255 255 255 / 42%);
        border-radius: 999px;
        background: linear-gradient(180deg, var(--track), var(--track-deep));
        color: #fffaf0;
        padding: 3px 9px;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 30%),
          0 9px 18px color-mix(in srgb, var(--track) 24%, transparent);
        font-size: 0.62rem;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .course-bar em {
        font-style: normal;
        opacity: 0.86;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        background: rgb(20 16 12 / 72%);
        padding: 22px;
      }

      .modal.is-open {
        display: grid;
      }

      .modal__panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        width: min(1400px, 100%);
        height: min(900px, 100%);
        margin: auto;
        border: 1px solid #d8c79f;
        border-radius: 8px;
        background: #fffdf8;
        box-shadow: 0 32px 90px rgb(0 0 0 / 34%);
      }

      .modal__bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid #e2d6bf;
        padding: 12px 14px;
      }

      .modal__bar p {
        margin: 0;
        color: #3a3028;
        font-size: 0.86rem;
        font-weight: 900;
        line-height: 1.5;
      }

      .zoom-controls {
        display: inline-flex;
        overflow: hidden;
        border: 1px solid #d8c79f;
        border-radius: 999px;
        background: #fff;
      }

      .zoom-controls button,
      .close-button {
        display: inline-grid;
        place-items: center;
        min-width: 36px;
        min-height: 34px;
        border: 0;
        background: transparent;
        color: #2f2821;
        cursor: pointer;
        font-weight: 900;
      }

      .zoom-controls button + button {
        border-left: 1px solid #e7dcc8;
      }

      .close-button {
        grid-template-columns: auto auto;
        gap: 6px;
        min-width: 82px;
        border: 1px solid #d8c79f;
        border-radius: 999px;
        background: linear-gradient(180deg, #3a2b19, #1c150f);
        color: #fffaf0;
        padding: 0 12px;
      }

      .close-button span {
        font-size: 1.14rem;
        line-height: 1;
      }

      .close-button strong {
        font-size: 0.78rem;
        line-height: 1;
      }

      .modal__body {
        overflow: auto;
        padding: 12px;
        scrollbar-color: #b78a31 #f3ead9;
        scrollbar-width: thin;
      }

      .modal-table-scaler {
        width: max-content;
        min-width: max-content;
      }

      @media (max-width: 720px) {
        .prototype-page {
          width: min(100% - 18px, 1220px);
          padding-top: 16px;
        }

        .annual-card {
          padding: 14px;
        }

        .annual-card__head,
        .modal__bar {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .annual-card__preview {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .lux-button {
          grid-template-columns: auto auto;
          gap: 2px 12px;
          justify-content: center;
          min-height: 56px;
          padding: 11px 14px;
          font-size: 0.9rem;
        }

        .lux-button::before {
          grid-row: 1 / span 2;
          width: 30px;
          height: 30px;
          font-size: 1.16rem;
        }

        .lux-button span,
        .lux-button small {
          text-align: left;
        }

        .lux-button small {
          font-size: 0.64rem;
        }

        .modal {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="prototype-page">
      <article class="annual-card">
        <header class="annual-card__head">
          <div>
            <p class="annual-card__eyebrow">YEAR ROADMAP / PROTOTYPE</p>
            <h1>年間計画イメージ 統合表案</h1>
            <p class="annual-card__lead">
              学力レベルとクラス進行を1つの表に統合。通常表示では全体像を一画面で把握し、詳細は拡大表示でヘッダーと左列を固定したまま確認できます。
            </p>
          </div>
        </header>

        <div class="annual-card__preview">
          <section class="fit-panel" aria-label="年間計画イメージ 縮小プレビュー">
            <div class="fit-stage" id="fitStage">
              <div class="plan-table-shell" id="fitTableShell"></div>
            </div>
          </section>
          <div class="annual-card__actions">
            <button class="lux-button" type="button" data-open-modal>
              <span>拡大して見る</span>
              <small>固定表示で確認</small>
            </button>
          </div>
        </div>
      </article>
    </main>

    <aside class="modal" id="planModal" aria-modal="true" role="dialog" aria-label="年間計画イメージ 拡大表示">
      <div class="modal__panel">
        <header class="modal__bar">
          <p>ヘッダーと一番左の列を固定。横スクロール・縦スクロール・ズームで詳細を確認できます。</p>
          <div class="zoom-controls" aria-label="表示倍率">
            <button type="button" data-zoom-out aria-label="縮小">−</button>
            <button type="button" data-zoom-reset>100%</button>
            <button type="button" data-zoom-in aria-label="拡大">＋</button>
          </div>
          <button class="close-button" type="button" data-close-modal aria-label="閉じる">
            <span aria-hidden="true">×</span>
            <strong>閉じる</strong>
          </button>
        </header>
        <div class="modal__body" id="modalScroll">
          <div class="modal-table-scaler" id="modalTableShell"></div>
        </div>
      </div>
    </aside>

    <template id="planTableTemplate"></template>

    <script>
      const levels = [
        { level: "0", label: ["高校入試", "レベル"], schools: ["高校入試レベル"] },
        { level: "1", label: ["高校教科書", "入門"], schools: ["高校教科書入門"] },
        { level: "2", label: ["高校教科書", "標準〜発展"], schools: ["高校教科書標準〜発展"] },
        { level: "3", label: ["歯学部", "基礎ライン"], schools: ["日大(歯)", "大阪歯科大(歯)", "日本歯科(歯)", "昭和医大(歯)"] },
        {
          level: "4",
          label: ["歯学部上位", "医学部準備"],
          schools: ["川崎医大", "東京歯科大(歯)", "新潟大(歯)", "広島大(歯)", "長崎大(歯)", "徳島大(歯)", "鹿児島大(歯)", "九州歯科大(歯)", "東北大(歯)", "大阪大(歯)", "北海道大(歯)", "九州大(歯)"],
        },
        {
          level: "5",
          label: ["私立医学部", "標準"],
          schools: ["埼玉医大", "獨協医大", "岩手医大", "金沢医大", "杏林大", "帝京大", "愛知医大", "東海大", "東京女子医大", "聖マリアンナ医大", "北里大", "福岡大", "久留米大", "東京科学大(歯)"],
        },
        { level: "6", label: ["私立医学部", "中核"], schools: ["日本大学", "東邦大", "東京医大", "東北医科薬科大", "近畿大", "藤田医大", "兵庫医大"] },
        {
          level: "7",
          label: ["国公立医学部", "標準"],
          schools: ["徳島大", "佐賀大", "大分大", "山形大", "島根大", "弘前大", "福島県立医大", "高知大", "札幌医大", "香川大", "富山大", "秋田大", "福井大", "鳥取大", "琉球大", "関西医大", "産業医大", "自治医大", "大阪医科薬科大", "国際医療福祉大", "昭和医大"],
        },
        {
          level: "8",
          label: ["国公立医学部", "上位"],
          schools: ["京都府立医大", "筑波大", "広島大", "岡山大", "山口大", "浜松医大", "名古屋市立大", "鹿児島大", "長崎大", "熊本大", "宮崎大", "金沢大", "山梨大", "新潟大", "防衛医大", "滋賀医大", "信州大", "群馬大", "和歌山県立医大", "旭川医大", "三重大", "愛媛大", "日本医大"],
        },
        { level: "9", label: ["難関国公立", "難関私立"], schools: ["名古屋大", "九州大", "東北大", "北海道大", "奈良県立医大", "横浜市立大", "大阪公立大", "神戸大", "岐阜大", "千葉大", "東京慈恵会医大", "順天堂大"] },
        { level: "10", label: ["最難関", "医学部"], schools: ["東京科学大", "京都大", "大阪大", "慶應義塾大"] },
        { level: "11", label: ["最高到達", "ライン"], schools: ["東京大"] },
      ];

      const tracks = [
        {
          tone: "red",
          letter: "S",
          word: "elective",
          title: "頂点を極めるクラス",
          category: "最難関医学部対策",
          target: "偏差値60〜",
          lane: "Sクラス",
          promotions: [6],
          bars: [

      const pct = (value) => `${(value / 12) * 100}%`;
      const barTop = (index, total) => `${18 + (total - 1 - index) * 20}px`;

      function renderTable() {
        const colgroup = `<colgroup><col />${levels.map(() => "<col />").join("")}</colgroup>`;
        const thead = `
          <thead>
            <tr>
              <th scope="col">学力レベル<br />クラス進行</th>
              ${levels
                .map(
                  (level) => `
                    <th scope="col">
                      <div class="level-head">
                        <strong>${level.level}</strong>
                        <small>${level.label.map((line) => `<span>${line}</span>`).join("")}</small>
                      </div>
                    </th>`
                )
                .join("")}
            </tr>
          </thead>`;

        const schoolRow = `
          <tr class="schools-row">
            <th scope="row"><span>対応大学<br />目安</span></th>
            ${levels
              .map(
                (level) => `
                  <td class="school-cell">
                    ${
                      level.schools.length > 1
                        ? `<ul>${level.schools.map((school) => `<li>${school}</li>`).join("")}</ul>`
                        : `<p>${level.schools[0]}</p>`
                    }
                  </td>`
              )
              .join("")}
          </tr>`;

        const trackRows = tracks
          .map(
            (track) => `
              <tr class="track-row track-row--${track.tone}">
                <th class="track-head" scope="row">
                  <div class="track-mark"><span>${track.letter}</span><em>${track.word}</em></div>
                  <p>${track.lane}</p>
                  <strong>${track.title}</strong>
                  <small>【${track.category}】</small>
                  <b>${track.target}</b>
                </th>
                <td class="lane-cell" colspan="12">
                  ${track.promotions.map((point) => `<span class="promotion-line" style="--left:${pct(point)}"></span>`).join("")}
                  ${track.bars
                    .map(
                      (bar, index) => `
                        <span class="course-bar" style="--left:${pct(bar.start)}; --width:${pct(bar.end - bar.start)}; --top:${barTop(index, track.bars.length)}">
                          <span>${bar.label}</span><em>${bar.period}</em>
                        </span>`
                    )
                    .join("")}
                </td>
              </tr>`
          )
          .join("");

        return `<table class="plan-table">${colgroup}${thead}<tbody>${schoolRow}${trackRows}</tbody></table>`;
      }

      const fitStage = document.querySelector("#fitStage");
      const fitShell = document.querySelector("#fitTableShell");
      const modal = document.querySelector("#planModal");
      const modalShell = document.querySelector("#modalTableShell");
      const modalScroll = document.querySelector("#modalScroll");
      const tableMarkup = renderTable();
      let zoom = 1;

      fitShell.innerHTML = tableMarkup;
      modalShell.innerHTML = tableMarkup;

      function fitPreview() {
        const table = fitShell.querySelector(".plan-table");
        if (!table) return;
        fitShell.style.transform = "scale(1)";
        fitStage.style.height = "auto";
        const availableWidth = fitStage.clientWidth;
        const availableHeight = Math.max(320, Math.min(window.innerHeight * 0.7, 640));
        const scale = Math.min(availableWidth / table.scrollWidth, availableHeight / table.scrollHeight, 1);
        fitShell.style.transform = `scale(${scale})`;
        fitStage.style.height = `${Math.ceil(table.scrollHeight * scale)}px`;
      }

      function applyZoom() {
        const table = modalShell.querySelector(".plan-table");
        if (!table) return;
        modalShell.style.zoom = zoom;
        document.querySelector("[data-zoom-reset]").textContent = `${Math.round(zoom * 100)}%`;
      }

      function openModal() {
        modal.classList.add("is-open");
        document.body.style.overflow = "hidden";
        zoom = 1;
        applyZoom();
        modalScroll.scrollTo({ top: 0, left: 0 });
      }

      function closeModal() {
        modal.classList.remove("is-open");
        document.body.style.overflow = "";
      }

      document.querySelector("[data-open-modal]").addEventListener("click", openModal);
      document.querySelector("[data-close-modal]").addEventListener("click", closeModal);
      document.querySelector("[data-zoom-in]").addEventListener("click", () => {
        zoom = Math.min(1.8, Math.round((zoom + 0.1) * 10) / 10);
        applyZoom();
      });
      document.querySelector("[data-zoom-out]").addEventListener("click", () => {
        zoom = Math.max(0.6, Math.round((zoom - 0.1) * 10) / 10);
        applyZoom();
      });
      document.querySelector("[data-zoom-reset]").addEventListener("click", () => {
        zoom = 1;
        applyZoom();
      });
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("is-open")) closeModal();
      });
      window.addEventListener("resize", fitPreview);
      window.addEventListener("load", () => {
        fitPreview();
        applyZoom();
      });
    </script>
